# Tiny CPU-only scene used by the documentation quick start.
#
# It intentionally avoids HITRAN absorption and aerosol Mie calculations so a
# first run only exercises the core Rayleigh adding-doubling path.

radiative_transfer:
  spec_bands:
    - "[12987.0]"

  surface:
    - LambertianSurfaceScalar(0.15)

  # v0.7 schema: nstreams is the primary resolution knob.
  # Public contract: stream_l_cap = 2·nstreams - 1. Minimum 3
  # (Rayleigh phase function contributes through m=2).
  nstreams:           3
  polarization_type:  Stokes_I()
  # Pure Rayleigh: phase function fits within stream_l_cap, no truncation needed.
  truncation:         NoTruncation()
  depol:              -1
  float_type:         Float64
  architecture:       CPU()

# -----------------------------------------------------------------
# AZIMUTH CONVENTION (vSmartMOM):
#   `vaz` is the relative azimuth between the satellite-detector
#   and the Sun, measured in the principal plane.
#     vaz =   0°  -> Sun and satellite on *opposite* sides of zenith
#                    in the principal plane (vSmartMOM convention).
#     vaz = 180°  -> Sun directly *behind* the satellite (same side
#                    of zenith). This is the geometry that many
#                    third-party models — including MODTRAN — call
#                    "RAA = 0".
#   To compare with a model whose RAA = 0 means Sun-behind-satellite
#   (e.g. MODTRAN), set vaz = RAA + 180° (mod 360°).
# -----------------------------------------------------------------
geometry:
  sza:     60.0
  vza:     [60.0]
  vaz:     [180.0]
  obs_alt: 1000.0

atmospheric_profile:
  T: [250.0, 275.0]
  p: [100.0, 500.0, 1000.0]
  profile_reduction: -1
