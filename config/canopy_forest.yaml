# =================================================================
# Forest Canopy with Within-Canopy Atmosphere
# =================================================================
#
# This example uses the CanopySurface model: a multi-layer
# vegetation canopy backed by a Lambertian soil.  The canopy
# is solved internally via adding-doubling before interacting
# with the atmospheric RT.
#
# Parameters:
#   - soil:               Lambertian albedo 0.10 (dark soil)
#   - LAI = 5.0:          dense forest canopy
#   - n_layers = 4:       four canopy sub-layers
#   - leaf_reflectance:   0.45 (typical NIR)
#   - leaf_transmittance: 0.05
#   - include_atm = true: within-canopy gas absorption
#   - canopy_dp = 3.0:    ~30 m forest, 3 hPa pressure thickness
#
# Usage:
#   using vSmartMOM
#   params = parameters_from_yaml("config/canopy_forest.yaml")
#   model  = model_from_parameters(params)
#   R, T   = rt_run(model)
#
# For spectral leaf optics from PROSPECT, construct the surface
# in Julia code instead of YAML:
#   using CanopyOptics
#   leaf = LeafProspectProProperties(N=1.4, Ccab=40.0, ...)
#   canopy = CanopySurface_from_prospect(leaf, 400:1:2500; soil=..., LAI=5.0)
#   params.brdf[1] = canopy

radiative_transfer:
  spec_bands:
    - "[19417.0 19418.0]"

  # Soil surface underneath the canopy (wrapped by CanopySurface)
  surface:
    - LambertianSurfaceScalar(0.10)

  quadrature_type:    RadauQuad()
  polarization_type:  Stokes_IQUV()
  max_m:              3
  Δ_angle:            2.0
  l_trunc:            20
  # depol:              0.029   # <-- previous explicit value (auto via line below)
  depol:              -1
  float_type:         Float64
  architecture:       default_architecture

# -----------------------------------------------------------------
# AZIMUTH CONVENTION (vSmartMOM):
#   `vaz` is the relative azimuth between the satellite-detector
#   and the Sun, measured in the principal plane.
#     vaz =   0°  -> Sun and satellite on *opposite* sides of zenith
#                    in the principal plane (vSmartMOM convention).
#     vaz = 180°  -> Sun directly *behind* the satellite (same side
#                    of zenith). This is the geometry that many
#                    third-party models — including MODTRAN — call
#                    "RAA = 0".
#   To compare with a model whose RAA = 0 means Sun-behind-satellite
#   (e.g. MODTRAN), set vaz = RAA + 180° (mod 360°).
# -----------------------------------------------------------------
geometry:
  sza:     30
  vza:     [60, 45, 30, 15, 0, 15, 30, 45, 60]
  vaz:     [180, 180, 180, 180, 0, 0, 0, 0, 0]
  obs_alt: 1000.0

atmospheric_profile:
  T: [244.33, 251.34, 258.09, 264.25, 269.15,
      272.59, 274.07, 273.30, 269.65, 264.27, 258.11,
      251.52, 245.22, 239.20, 234.05, 229.71, 225.70,
      222.70, 220.62, 219.32, 217.93, 216.98, 217.10,
      218.35, 223.33, 234.19, 249.34, 264.12, 277.20,
      280.77, 282.60, 284.40, 285.80]
  p: [  0.14,   0.22,   0.30,   0.39,   0.53,   0.71,
        0.96,   1.28,   1.70,   2.27,   3.03,   4.03,
        5.44,   7.26,   9.67,  12.90,  17.23,  23.30,
       31.00,  42.07,  56.09,  74.78,  99.69, 131.00,
      176.85, 236.64, 314.58, 418.87, 557.76, 735.00,
      800.12, 849.00, 912.00, 980.00]
  profile_reduction: -1

# Canopy configuration (activates CanopySurface wrapping)
canopy:
  LAI:                5.0
  n_layers:           4
  leaf_reflectance:   0.45
  leaf_transmittance: 0.05
  include_atm:        true
  canopy_dp:          3.0        # ~30 m forest ≈ 3 hPa
