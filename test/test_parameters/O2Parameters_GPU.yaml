# =================================================================
# O2-A band config for GPU Raman forward tests (small wavelength range)
# ~60 spectral points to keep GPU memory manageable (RRS coupling matrices scale as nSpec²).
# Use O2Parameters.yaml for full CPU runs.
# =================================================================
radiative_transfer: 
  spec_bands:
    # Narrow range, 1 cm⁻¹ step → ~60 points (vs 0.05 step / ~6800 in O2Parameters.yaml)
    - (1e7/771):1.0:(1e7/767)
  surface: 
    - LambertianSurfaceScalar{Float64}(0.0)
  polarization_type:  Stokes_IQU()
  nstreams:           3
  truncation:         auto
  # depol:              0.03   # <-- previous explicit value (auto via line below)
  depol:              -1
  float_type:         Float64
  architecture:       Architectures.GPU()

# -----------------------------------------------------------------
# AZIMUTH CONVENTION (vSmartMOM):
#   `vaz` is the relative azimuth between the satellite-detector
#   and the Sun, measured in the principal plane.
#     vaz =   0°  -> Sun and satellite on *opposite* sides of zenith
#                    in the principal plane (vSmartMOM convention).
#     vaz = 180°  -> Sun directly *behind* the satellite (same side
#                    of zenith). This is the geometry that many
#                    third-party models — including MODTRAN — call
#                    "RAA = 0".
#   To compare with a model whose RAA = 0 means Sun-behind-satellite
#   (e.g. MODTRAN), set vaz = RAA + 180° (mod 360°).
# -----------------------------------------------------------------
geometry: 
  sza:                60.0
  vza:                [60.0, 60.0, 30.0, 30.0]
  vaz:                [0.0, 180.0, 0.0, 180.0]
  obs_alt:            1000.0

atmospheric_profile: 
  T: [231.62, 244.33, 251.34, 258.09, 264.25, 269.15, 
      272.59, 274.07, 273.30, 269.65, 264.27, 258.11, 
      251.52, 245.22, 239.20, 234.05, 229.71, 225.70, 
      222.70, 220.62, 219.32, 217.93, 216.98, 217.10, 
      218.35, 223.33, 234.19, 249.34, 264.12, 277.20, 
      280.77, 282.60, 284.40, 285.80]
  p: [  0.14,   0.22,   0.30,   0.39,   0.53,   0.71,   
        0.96,   1.28,   1.70,   2.27,   3.03,   4.03,  
        5.44,   7.26,   9.67,  12.90,  17.23,  23.30,  
       31.00,  42.07,  56.09,  74.78,  99.69, 131.00,
      176.85, 236.64, 314.58, 418.87, 557.76, 735.00, 
      800.12, 849.00, 912.00, 980.00, 1005.0]
  profile_reduction: 5

absorption:
  molecules:
    - [O2]
  vmr: 
    O2:   0.21
  broadening:         Voigt()
  CEF:                HumlicekWeidemann32SDErrorFunction()
  wing_cutoff:        20

scattering:
  aerosols:       
    - τ_ref:          0.04
      μ:              0.01
      σ:              1.12
      nᵣ:             1.3
      nᵢ:             0.00000001
      p₀:             700.0
      σp:             50.0
  r_max:          50.0
  nquad_radius:   1000
  λ_ref:          0.770
  decomp_type:        NAI2()
