# =================================================================
# EMIT-Style Fast Test Configuration (CPU, 2 bands, few wavelengths)
# For quick iteration on CPU -- use ParamsEMIT.yaml for full testing
# =================================================================
radiative_transfer: 
  spec_bands:
    - (1e7/775):5.0:(1e7/770)
    - (1e7/2380):20.0:(1e7/2320)
  surface: 
    - LambertianSurfaceScalar{Float64}(0.3)
    - LambertianSurfaceScalar{Float64}(0.2)
  polarization_type:  Stokes_IQU()
  nstreams:           3
  truncation:         auto
  # depol:              0.028   # <-- previous explicit value (auto via line below)
  depol:              -1
  float_type:         Float64
  architecture:       default_architecture

# -----------------------------------------------------------------
# AZIMUTH CONVENTION (vSmartMOM):
#   `vaz` is the relative azimuth between the satellite-detector
#   and the Sun, measured in the principal plane.
#     vaz =   0°  -> Sun and satellite on *opposite* sides of zenith
#                    in the principal plane (vSmartMOM convention).
#     vaz = 180°  -> Sun directly *behind* the satellite (same side
#                    of zenith). This is the geometry that many
#                    third-party models — including MODTRAN — call
#                    "RAA = 0".
#   To compare with a model whose RAA = 0 means Sun-behind-satellite
#   (e.g. MODTRAN), set vaz = RAA + 180° (mod 360°).
# -----------------------------------------------------------------
geometry: 
  sza:                30.0
  vza:                [0.0, 45.0]
  vaz:                [0.0, 0.0]
  obs_alt:            0

atmospheric_profile: 
  T: [330.0, 270.0, 224.4, 201.95, 191.75, 187.65, 187.9, 193.75, 
      203.5, 214.0, 226.45, 240.15, 253.9, 265.75, 270.65, 267.4, 
      260.75, 253.85, 246.65, 239.7, 233.25, 228.25, 
      225.25, 222.8, 221.1, 220.1, 219.1, 218.1, 217.15, 
      216.7, 216.7, 216.7, 216.7, 216.7, 216.7, 216.7, 216.7, 216.75, 
      220.05, 226.5, 232.95, 239.45, 245.95, 252.45, 258.95, 265.45, 271.95, 278.45, 284.95]
  p: [2.54e-5, 4.01e-5, 7.1e-5, 0.000145, 0.00032, 0.00076, 0.00184, 
      0.00446, 0.0105, 0.024, 0.0522, 0.109, 0.219, 0.425, 0.7978, 
      1.09, 1.491, 2.06, 2.871, 4.15, 5.746, 8.01, 11.97, 17.43, 
      25.49, 29.72, 34.67, 40.47, 47.29, 55.29, 64.67, 75.65, 88.5, 
      103.5, 121.1, 141.7, 165.8, 194.0, 227.0, 265.0, 308.0, 356.5, 
      411.1, 472.2, 540.5, 616.6, 701.2, 795.0, 898.8, 1013.0]
  profile_reduction: 5

absorption:
  molecules:
    - [O2]
    - [CH4]
  vmr: 
    O2:   0.21
    CH4:  1.85e-6
  broadening:         Voigt()
  CEF:                HumlicekWeidemann32SDErrorFunction()
  wing_cutoff:        40

scattering:
  aerosols:       
    - τ_ref:          0.13
      μ:              0.1
      σ:              1.75
      nᵣ:             1.5
      nᵢ:             0.001
      p₀:             900.0
      σp:             50.0
  r_max:          50.0
  nquad_radius:   1000
  λ_ref:          0.55
  decomp_type:        NAI2()
