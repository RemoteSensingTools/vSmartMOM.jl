# =================================================================
# Scattering — one arbitrary aerosol (lognormal size distribution,
# lognormal vertical profile peaked near 2 km).
# τ_ref is overwritten per-scenario by the driver script from AOT550.
# =================================================================
scattering:
  aerosols:
    - τ_ref:          0.1       # overwritten per scenario (AOT550)
      μ:              0.3       # lognormal mean radius (µm)
      σ:              1.5       # lognormal geometric stddev (must be ≥ 1)
      nᵣ:             1.443      # real refractive index
      nᵢ:             0.0037     # imag refractive index
      z₀:             2.0       # vertical peak altitude (km)
      σ₀:             0.4       # vertical peak width (km)
  r_max:          30.0
  nquad_radius:   1000
  λ_ref:          0.55          # AOT550 reference wavelength
  decomp_type:    NAI2()
