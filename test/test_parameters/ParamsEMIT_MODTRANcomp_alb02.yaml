# =================================================================
# Parameter file for the EMIT / MODTRAN LUT comparison scenarios
# (driven by ~/data/EMIT_MODTRANcomp/emit_20250404.json)
#
# Geometry (SZA, RAA) is taken from the JSON "MISC" block. AOT550,
# H2OSTR, GNDALT (and TSZ) are LUT-grid dimensions that are varied
# by the driver script on a per-scenario basis.
#
# Set VSMARTMOM_EMIT_LUT_DIR to the directory containing *_emit_lut.jld2.
# =================================================================
radiative_transfer:
  # Spectral bands (list of ν_start:ν_step:ν_end, in cm⁻¹).
  spec_bands:
    - 3984.2:0.1:26315.7
  surface:
    - LambertianSurfaceScalar{Float64}(0.2)
  quadrature_type:    GaussQuadHemisphere()
  polarization_type:  Stokes_I()
  max_m:              3
  Δ_angle:            2.0
  l_trunc:            5
  # depol:              0.028   # <-- previous explicit value (auto via line below)
  depol:              -1
  float_type:         Float32
  architecture:       Architectures.GPU()

# =================================================================
# Simulation Geometry  (SZA, RAA from emit_20250404.json MISC block)
# =================================================================
geometry:
  sza:                39.583965990615404    # MISC.SZA
  vza:                [0.0]                 # nadir viewing
  vaz:                [81.49773971061641]   # MISC.RAA
  obs_alt:            0                     # observer at TOA

# =================================================================
# Atmospheric Profile — LUT-aligned (54 pressure levels, 53 layers)
# All query pressures on LUT grid (20.01–1080.01 hPa) to avoid interpolation issues
# =================================================================
atmospheric_profile:
