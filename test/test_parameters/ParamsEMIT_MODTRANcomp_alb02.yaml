  # Temperature profile (TOA→BOA, layer centres, K) — 53 layers
  T: [215.20, 215.21, 216.03, 216.82, 217.47, 218.00, 218.46, 218.86, 219.21, 220.01, 221.91, 224.46, 227.48, 230.29, 232.94, 235.49, 237.83, 240.18, 242.32, 244.40, 246.48, 248.35, 250.20, 252.05, 253.77, 255.42, 257.07, 258.72, 259.89, 261.06, 262.23, 263.40, 264.18, 264.96, 265.73, 266.50, 267.23, 267.92, 268.61, 269.30, 269.99, 270.65, 271.27, 271.90, 272.52, 273.14, 273.76, 274.38, 275.01, 275.63, 276.25, 276.87, 277.49]
