# Phase 1b regression reference configuration — toy 1-band RRS
#
# Derived from sanghavi's test/test_parameters/O2_parameters2_SIF_grid_float32.yaml
# per user's 2026-04-19 Phase 1b kickoff Q2 answer. Spectral range reduced to
# 761–764 nm with the sanghavi default 0.1 cm⁻¹ step (≈517 points). Float32 /
# Stokes_IQU / GaussQuadHemisphere retained from the sanghavi source. Absorption
# block removed to isolate the RRS/Rayleigh path from HITRAN/LUT availability —
# this is the Phase 1b gate (clean RRS numerics), not an O2 A-band physics test.
# Aerosol τ_ref = 0 so the path is pure Rayleigh + RRS.

radiative_transfer:
  # Single band 761–764 nm (wavenumber 1e7/764 ≈ 13089 to 1e7/761 ≈ 13141 cm⁻¹)
  spec_bands:
    - (1e7/764):0.1:(1e7/761)
  surface:
    - LambertianSurfaceScalar{Float64}(0.0)
  quadrature_type:    GaussQuadHemisphere()
  polarization_type:  Stokes_IQU()
  max_m:              3
  Δ_angle:            2.0
  l_trunc:            5
  depol:              0.028
  float_type:         Float32
  architecture:       Architectures.CPU()

geometry:
  sza:     19.0
  vza:     [0.0]
  vaz:     [0.0]
  obs_alt: 0

atmospheric_profile:
  T:
    [231.62, 244.33, 251.34, 258.09, 264.25, 269.15,
     272.59, 274.07, 273.30, 269.65, 264.27, 258.11,
     251.52, 245.22, 239.20, 234.05, 229.71, 225.70,
     222.70, 220.62, 219.32, 217.93, 216.98, 217.10,
     218.35, 223.33, 234.19, 249.34, 264.12, 277.20,
     280.77, 282.60, 284.40, 285.80]
  p:
    [  0.14,   0.22,   0.30,   0.39,   0.53,   0.71,
       0.96,   1.28,   1.70,   2.27,   3.03,   4.03,
       5.44,   7.26,   9.67,  12.90,  17.23,  23.30,
      31.00,  42.07,  56.09,  74.78,  99.69, 131.00,
     176.85, 236.64, 314.58, 418.87, 557.76, 735.00,
     800.12, 849.00, 912.00, 980.00, 1000.0]
  q:
    [2.1e-6, 2.85e-6, 3.45e-6, 4.5e-6, 5.7e-6,
     6.45e-6, 7.35e-6, 9.3e-6, 11.4e-6, 13.95e-6,
     15.3e-6, 16.5e-6, 17.7e-6, 20.1e-6, 20.7e-6,
     23.1e-6, 25.2e-6, 26.4e-6, 27.3e-6, 19.65e-6,
     14.1e-6, 8.7e-6, 5.85e-6, 4.95e-6, 4.95e-6,
     16.95e-6, 195.0e-6, 577.5e-6, 1366.5e-6, 3673.5e-6,
     4350.0e-6, 5100.0e-6, 5994.0e-6, 6789.0e-6, 7029.0e-6]
  profile_reduction: 12

scattering:
  # Aerosol τ_ref = 0 so the path is pure Rayleigh + RRS. p₀/σp values are
  # unified's pressure-peak schema (vs sanghavi's z₀/σ₀ altitude form) — with
  # τ_ref = 0 the specific values don't matter, but the schema validator
  # requires them.
  aerosols:
    - τ_ref:  0.0
      μ:      0.01
      σ:      1.12
      nᵣ:     1.5
      nᵢ:     0.00000001
      p₀:     800.0
      σp:     100.0
  r_max:         50.0
  nquad_radius:  2500
  λ_ref:         0.770
  decomp_type:   NAI2()
