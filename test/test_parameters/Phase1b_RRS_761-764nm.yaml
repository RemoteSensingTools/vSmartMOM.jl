# Phase 1b regression reference configuration — toy 1-band RRS
#
# Spectral range narrowed to 762.9–763.1 nm (~34 cm⁻¹ wide at 0.1 cm⁻¹ step ≈ 34
# points) so the routine regression gate runs in seconds on CPU while still
# exercising the full RRS code path (Fourier moments, doubling_inelastic,
# interaction_inelastic, RRS.Z_λ₁λ₀ cross-wavelength matrices). Per user's
# 2026-04-19 Q1 answer for commit 7 config scope.
#
# Aerosol vertical distribution uses the new z₀/σ₀ (altitude-form, km) schema —
# matching sanghavi's YAML convention, now supported by unified's validator.
# τ_ref = 0, so the path is pure Rayleigh + RRS.

radiative_transfer:
  # Single band 762–765 nm (wavenumber 1e7/765 ≈ 13071 to 1e7/762 ≈ 13123 cm⁻¹,
  # step 0.5 cm⁻¹ → ~104 points). The ~50 cm⁻¹ window is wide enough to capture
  # the strongest N₂/O₂ rotational Raman transitions (at ~25–55 cm⁻¹ shifts),
  # so ieR and ieT are non-zero and the regression gate actually exercises the
  # RRS branch. Coarser 0.5 cm⁻¹ step keeps the O(nSpec²) memory manageable on
  # CPU — target wall time ~1 min on CPU / ~seconds on GPU.
  spec_bands:
    - (1e7/765):0.5:(1e7/762)
  surface:
    - LambertianSurfaceScalar{Float64}(0.0)
  quadrature_type:    GaussQuadHemisphere()
  polarization_type:  Stokes_IQU()
  max_m:              3
  Δ_angle:            2.0
  l_trunc:            5
  depol:              0.028
  float_type:         Float32
  architecture:       Architectures.CPU()

geometry:
  sza:     19.0
  vza:     [0.0]
  vaz:     [0.0]
  obs_alt: 0

atmospheric_profile:
  T:
    [231.62, 244.33, 251.34, 258.09, 264.25, 269.15,
     272.59, 274.07, 273.30, 269.65, 264.27, 258.11,
     251.52, 245.22, 239.20, 234.05, 229.71, 225.70,
     222.70, 220.62, 219.32, 217.93, 216.98, 217.10,
     218.35, 223.33, 234.19, 249.34, 264.12, 277.20,
     280.77, 282.60, 284.40, 285.80]
  p:
    [  0.14,   0.22,   0.30,   0.39,   0.53,   0.71,
       0.96,   1.28,   1.70,   2.27,   3.03,   4.03,
       5.44,   7.26,   9.67,  12.90,  17.23,  23.30,
      31.00,  42.07,  56.09,  74.78,  99.69, 131.00,
     176.85, 236.64, 314.58, 418.87, 557.76, 735.00,
     800.12, 849.00, 912.00, 980.00, 1000.0]
  q:
    [2.1e-6, 2.85e-6, 3.45e-6, 4.5e-6, 5.7e-6,
     6.45e-6, 7.35e-6, 9.3e-6, 11.4e-6, 13.95e-6,
     15.3e-6, 16.5e-6, 17.7e-6, 20.1e-6, 20.7e-6,
     23.1e-6, 25.2e-6, 26.4e-6, 27.3e-6, 19.65e-6,
     14.1e-6, 8.7e-6, 5.85e-6, 4.95e-6, 4.95e-6,
     16.95e-6, 195.0e-6, 577.5e-6, 1366.5e-6, 3673.5e-6,
     4350.0e-6, 5100.0e-6, 5994.0e-6, 6789.0e-6, 7029.0e-6]
  profile_reduction: 12

scattering:
  # Altitude-form (z₀, σ₀) — sanghavi's preferred YAML convention. Altitude in
  # km; σ₀ is the log-normal scale parameter in log-km. τ_ref = 0 means Mie
  # optics are computed but never weighted into the RT — pure Rayleigh + RRS.
  aerosols:
    - τ_ref:  0.0
      μ:      0.01
      σ:      1.12
      nᵣ:     1.5
      nᵢ:     0.00000001
      z₀:     2.0
      σ₀:     0.4
  r_max:         50.0
  nquad_radius:  2500
  λ_ref:         0.770
  decomp_type:   NAI2()
