# Arrays run TOA → BOA. p is on half-levels (50); T, q and vmr arrays
# are on the 49 layer centres, obtained by averaging adjacent AFGL levels.
# H2O mixing ratio is used to derive specific humidity q (≈0.622·vmr_H2O).
# =================================================================
