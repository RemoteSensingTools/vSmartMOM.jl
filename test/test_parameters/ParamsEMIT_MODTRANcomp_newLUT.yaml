# =================================================================
# ParamsEMIT_MODTRANcomp_newLUT.yaml
#
# Same scenario as ParamsEMIT_MODTRANcomp.yaml but pointing at the
# rebuilt HITRAN LUTs under ~/data/HITRAN_LUTs/  (Δν = 0.01 cm⁻¹,
# linear interp, Float32, 280–3500 nm). See
# plans/HANDOFF_LUT_REBUILD_2026-04-23.md for the rebuild spec.
#
# Note on spectral band: the rebuilt LUT spans 2857.14–35714.29 cm⁻¹
# (exact). Use spec_bands inside that range.
#
# Set VSMARTMOM_HITRAN_LUT_DIR to the rebuilt HITRAN LUT directory.
# =================================================================
radiative_transfer:
  spec_bands:
    - 3984.2:0.1:28571.4   # 350 - 2510 nm (extended from 380 nm to capture Hartley/Huggins UV)
  surface:
    - LambertianSurfaceScalar{Float64}(0.0)
  polarization_type:  Stokes_I()
  nstreams:           3
  truncation:         auto
  depol:              -1     # auto: per-band depol from N₂/O₂ molecular constants
  float_type:         Float32
  architecture:       Architectures.GPU()

# -----------------------------------------------------------------
# AZIMUTH CONVENTION (vSmartMOM):
#   `vaz` is the relative azimuth between the satellite-detector
#   and the Sun, measured in the principal plane.
#     vaz =   0°  -> Sun and satellite on *opposite* sides of zenith
#                    in the principal plane (vSmartMOM convention).
#     vaz = 180°  -> Sun directly *behind* the satellite (same side
#                    of zenith). This is the geometry that many
#                    third-party models — including MODTRAN — call
#                    "RAA = 0".
#   To compare with a model whose RAA = 0 means Sun-behind-satellite
#   (e.g. MODTRAN), set vaz = RAA + 180° (mod 360°).
# -----------------------------------------------------------------
geometry:
  sza:                39.583965990615404
  vza:                [12.0]
  vaz:                [81.49773971061641]
  obs_alt:            0

