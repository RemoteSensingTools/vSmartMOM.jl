# solar_tester (vector, Stokes-3) — vSmartMOM configuration matching VLIDORT
# 2.8.3 `V2p8p3_solar_tester.f90` + `2p8p3_VLIDORT_ReadInput.cfg` with NSTOKES=3.
#
# Same atmosphere as the scalar solar_tester (23-layer input_atmos.dat) but:
#   - Polarization: Stokes_IQU
#   - Aerosol: Problem III (Mie F-matrix, gamma-distributed, n=1.43,
#     reff=1.05, veff=0.07 at 0.782 µm), ω̃ = 0.99999, total τ_aer = 0.5.
#     The 6-element Greek expansion lives in
#     reference_data/solar_tester_problemIII_aerosol.jl.
#
# IMPORTANT: f90 driver overrides cfg's Lambertian albedo 0.2 → 0.05 at
# line 392 of V2p8p3_solar_tester.f90 (same convention as scalar).
#
# spec_band uses 2 frequencies (not 1) — see solar_tester.yaml header for
# the nSpec=1 numerical issue we worked around.

radiative_transfer:
  spec_bands:
    - "[18867.92 18867.93]"
  surface:
    - LambertianSurfaceScalar(0.05)
  quadrature_type:    GaussQuadHemisphere()
  polarization_type:  Stokes_IQU()
  max_m:              16          # NSTOKES=3, NSTREAMS=8 ⇒ Fourier-moment count ≤ 2·NSTREAMS = 16
  Δ_angle:            2.0
  l_trunc:            16          # match VLIDORT NMOMENTS (cap at 2·NSTREAMS−1 = 15 + 1 for L=0..15)
  truncation:         "NoTruncation()"
  depol:              0.01072
  float_type:         Float64
  architecture:       Architectures.CPU()

geometry:
  sza:                35.0          # overridden per-run in case file
  vza:                [10.0, 20.0, 40.0]
  vaz:                [0.0, 0.0, 0.0]
  obs_alt:            1000.0

atmospheric_profile:
  T: [231.62, 231.62, 231.62, 231.62, 231.62, 231.62, 231.62, 231.62, 231.62, 231.62,
      231.62, 231.62, 231.62, 231.62, 231.62, 231.62, 231.62, 231.62, 231.62, 231.62,
      231.62, 231.62, 231.62]
  p: [0.001, 0.01, 0.05, 0.1, 0.5, 1.0, 5.0, 10.0, 30.0, 60.0,
      100.0, 150.0, 200.0, 250.0, 300.0, 400.0, 500.0, 600.0, 700.0, 800.0,
      900.0, 950.0, 1000.0, 1013.25]
  profile_reduction: -1

scattering:
  aerosols:
    - τ_ref: 0.5
      phase_function: HenyeyGreensteinPhaseFunction(0.7)   # placeholder; overridden in case file
      ssa: 0.99999
      p₀: 0.18
      σp: 0.05
  r_max:          50.0
  nquad_radius:   100
  λ_ref:          0.333
  decomp_type:    NAI2()
