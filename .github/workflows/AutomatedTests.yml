name: AutomatedTests

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11', '1.12']
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: "Set up Julia"
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  # Validate setup TOML files against the JSON Schema so editor /
  # autocomplete experience matches what we ship. Linux-only; cheap.
  taplo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Taplo
        run: |
          install_dir="${RUNNER_TEMP}/taplo"
          mkdir -p "$install_dir"
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz \
            | gunzip > "$install_dir/taplo"
          chmod +x "$install_dir/taplo"
          echo "$install_dir" >> "$GITHUB_PATH"
      - name: Lint setup TOML files
        run: taplo lint
