<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .ink { stroke: #1a1a1a; }
    @media (prefers-color-scheme: dark) { .ink { stroke: #e6e6e6; } }
  </style>
  <!-- Spectrum continuum (accent — the photon flux) -->
  <line x1="2" y1="12" x2="22" y2="12" stroke="#4a90c2" stroke-width="1.5"/>
  <!-- Two absorption notches (ink — the molecules that ate the light) -->
  <g class="ink" stroke-width="1.5">
    <polyline points="8,12 9,18 10,12"/>
    <polyline points="15,12 16,18 17,12"/>
  </g>
</svg>
