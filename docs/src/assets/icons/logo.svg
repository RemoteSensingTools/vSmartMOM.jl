<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .ink { stroke: #1a1a1a; }
    @media (prefers-color-scheme: dark) { .ink { stroke: #e6e6e6; } }
  </style>
  <!-- Atmospheric layers -->
  <g class="ink" stroke-width="1.5">
    <line x1="4" y1="6"  x2="20" y2="6"/>
    <line x1="4" y1="11" x2="20" y2="11"/>
    <line x1="4" y1="16" x2="20" y2="16"/>
  </g>
  <!-- Surface (slightly thicker) -->
  <line class="ink" x1="3" y1="21" x2="21" y2="21" stroke-width="2.5"/>
  <!-- Photon transported through the middle layer -->
  <circle cx="12" cy="11" r="1.6" fill="#4a90c2"/>
</svg>
